<main class="max-w-7xl mx-auto">
  
  <app-page-header 
    title="Catálogo de vacinas" 
    subtitle="Referência completa do calendário nacional de vacinação infantil." 
  />

  <app-filter-toolbar
    [searchTerm]="searchTerm"
    [activeFilter]="activeFilter"
    [filters]="filters"
    (searchChange)="onSearchChange($event)"
    (filterChange)="setFilter($event)">
  </app-filter-toolbar>

  <!-- Grid -->
  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mt-8">
    <app-vaccine-card *ngFor="let vaccine of filteredVaccines" [vaccine]="vaccine"></app-vaccine-card>
  </div>
</main>
