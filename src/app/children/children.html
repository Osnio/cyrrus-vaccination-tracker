<main class="max-w-7xl mx-auto">
  <aside class="mb-8">
    <div class="flex items-center justify-between mb-6">
    <app-page-header 
      title="Crianças" 
      subtitle="5 crianças cadastradas na sua família."
    />
    <button (click)="openAddModal()" 
      class="px-6 py-3 bg-(--primary) text-white rounded-3xl font-semibold flex items-center gap-2 hover:brightness-105">
      <i class="bi bi-plus-lg"></i> Adicionar Criança
    </button>

    </div>
    

    <app-filter-toolbar
      [searchTerm]="searchTerm"
      [activeFilter]="activeFilter"
      [sortBy]="sortBy"
      [filters]="filters"
      [sortOptions]="sortOptions"
      (searchChange)="onSearchChange($event)"
      (filterChange)="setFilter($event)"
      (sortChange)="onSortChange($event)">
    </app-filter-toolbar>
  </aside>

  
  <div class="children-grid grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 2xl:grid-cols-5 gap-6">
    <app-child-card
      *ngFor="let child of filteredChildren"
      [child]="child">
    </app-child-card>
  </div>

  
  <div *ngIf="filteredChildren.length === 0" class="text-center py-16 text-muted-foreground">
    Nenhuma criança encontrada com os filtros aplicados.
  </div>

  <app-add-child-modal *ngIf="showAddModal" (closed)="closeAddModal()"></app-add-child-modal>

</main>
