<main class="max-w-7xl mx-auto flex flex-col">
  <aside class="mb-8">
    <div class="flex flex-col lg:flex-row lg:items-center lg:justify-between gap-4 mb-6">
      <app-page-header
        title="Crianças"
        subtitle="{{ totalChildren }} crianças cadastradas na sua família.">
      </app-page-header>

      <button (click)="openAddModal()" class="add-child-btn group">
        <i class="bi bi-plus-lg"></i>
        <span>Adicionar Criança</span>
      </button>
    </div>

    <app-filter-toolbar
      [searchTerm]="searchTerm"
      [activeFilter]="activeFilter"
      [sortBy]="sortBy"
      [filters]="filters"
      [sortOptions]="sortOptions"
      (searchChange)="onSearchChange($event)"
      (filterChange)="setFilter($event)"
      (sortChange)="onSortChange($event)">
    </app-filter-toolbar>
  </aside>

  <!-- Grid de Crianças -->
  <div class="children-grid grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 2xl:grid-cols-5 gap-6">
    <app-child-card
      *ngFor="let child of pagedChildren"
      [child]="child">
    </app-child-card>
  </div>

  <!-- Mensagem quando não há resultados -->
  <div *ngIf="filteredChildren.length === 0" class="text-center py-16 text-muted-foreground">
    Nenhuma criança encontrada com os filtros aplicados.
  </div>

  <!-- Paginação -->
  <div *ngIf="filteredChildren.length > 0" class="flex flex-col sm:flex-row items-center justify-between mt-10 gap-4">
    <p class="text-sm text-gray-500">
      Mostrando <strong>{{ startItem }}</strong>–<strong>{{ endItem }}</strong> de 
      <strong>{{ filteredChildren.length }}</strong> crianças
    </p>

    <div class="flex items-center gap-2">
      <button 
        (click)="prevPage()"
        [disabled]="currentPage === 1"
        class="px-4 py-2 cursor-pointer border border-gray-300 rounded-3xl text-sm font-medium disabled:opacity-50 disabled:cursor-not-allowed hover:bg-gray-50 transition-colors">
        ← Anterior
      </button>

      <div class="flex gap-1">
        <button 
          *ngFor="let page of pageNumbers"
          (click)="goToPage(page)"
          [class.bg-(--primary)]="page === currentPage"
          [class.text-white]="page === currentPage"
          class="w-10 h-10 flex items-center justify-center rounded-3xl text-sm font-medium border border-gray-300 hover:bg-gray-50 transition-colors">
          {{ page }}
        </button>
      </div>

      <button 
        (click)="nextPage()"
        [disabled]="currentPage === totalPages"
        class="px-4 py-2 cursor-pointer border border-gray-300 rounded-3xl text-sm font-medium disabled:opacity-50 disabled:cursor-not-allowed hover:bg-gray-50 transition-colors">
        Próximo →
      </button>
    </div>
  </div>

  <app-add-child-modal *ngIf="showAddModal" (closed)="closeAddModal()"></app-add-child-modal>
</main>
