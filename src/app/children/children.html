<main class="max-w-7xl mx-auto">
  <div class="mb-8">

    <app-page-header 
      title="Crianças" 
      subtitle="5 crianças cadastradas na sua família."
    />

    <!-- Barra de Ferramentas -->
    <div class="bg-white rounded-3xl shadow-sm border border-gray-100 p-5 flex flex-col md:flex-row gap-4 items-center">
      
      <!-- Search -->
      <div class="flex-1 relative">
        <div class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400">
          <i class="bi bi-search"></i>
        </div>
        <input 
          type="text"
          [(ngModel)]="searchTerm"
          (input)="applyFilters()"
          placeholder="Buscar por nome..."
          class="w-full bg-[#f8f4ed] border border-transparent focus:border-(--accent) pl-11 py-3.5 rounded-2xl text-sm focus:outline-none">
      </div>

      <!-- Filtros de Status -->
      <div class="flex gap-2 flex-wrap">
        <button *ngFor="let filter of filters" 
                (click)="setFilter(filter.value)"
                [class.active]="activeFilter === filter.value"
                class="px-6 py-3 rounded-3xl text-sm font-medium transition-all">
          {{ filter.label }}
        </button>
      </div>

      <!-- Ordenação -->
      <div class="min-w-45">
        <select 
          [(ngModel)]="sortBy"
          (change)="applyFilters()"
          class="w-full bg-white border border-gray-200 rounded-2xl px-4 py-3.5 text-sm focus:outline-none focus:border-(--accent)">
          <option value="name">Ordenar: Nome</option>
          <option value="progress">Ordenar: Progresso</option>
          <option value="age">Ordenar: Idade</option>
        </select>
      </div>
    </div>
  </div>

  <!-- GRID DE CARDS -->
  <div class="children-grid grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
    <app-child-card
      *ngFor="let child of filteredChildren"
      [child]="child">
    </app-child-card>
  </div>

</main>
