<main class="max-w-7xl mx-auto flex flex-col">
  <aside class="mb-8">
    <div class="flex flex-col lg:flex-row lg:items-center lg:justify-between gap-4 mb-6">
      <app-page-header
        title="Crianças"
        subtitle="{{ totalChildren }} crianças cadastradas na sua família.">
      </app-page-header>

      <button (click)="openAddModal()" class="add-child-btn group">
        <i class="bi bi-plus-lg"></i>
        <span>Adicionar Criança</span>
      </button>
    </div>

    <app-filter-toolbar
      [searchTerm]="searchTerm"
      [activeFilter]="activeFilter"
      [sortBy]="sortBy"
      [startDate]="startDate"
      [endDate]="endDate"
      [filters]="filters"
      [sortOptions]="sortOptions"
      (searchChange)="onSearchChange($event)"
      (filterChange)="setFilter($event)"
      (sortChange)="onSortChange($event)"
      (startDateChange)="onStartDateChange($event)"
      (endDateChange)="onEndDateChange($event)"
      (clearFiltersEvent)="clearFilters()">
    </app-filter-toolbar>
  </aside>

  <!-- Grid de Crianças -->
  <div class="children-grid grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 2xl:grid-cols-5 gap-6">
    <app-child-card
      *ngFor="let child of pagedChildren"
      [child]="child">
    </app-child-card>
  </div>

  <!-- Mensagem quando não há resultados -->
  <div *ngIf="filteredChildren.length === 0" class="text-center py-16 text-muted-foreground">
    Nenhuma criança encontrada com os filtros aplicados.
  </div>

  <app-pagination
    [currentPage]="currentPage"
    [totalItems]="filteredChildren.length"
    [pageSize]="PAGE_SIZE"
    (pageChange)="onPageChange($event)">
  </app-pagination>
  <app-add-child-modal
    *ngIf="showAddModal"
    [isClosing]="isClosingModal"
    (closed)="closeAddModal()">
  </app-add-child-modal>
</main>
