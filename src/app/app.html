  <aside class="hidden lg:flex w-64 shrink-0 flex-col surface-card p-5 sticky top-6 h-[calc(100vh-3rem)]">
      <!-- <app-brand></app-brand> -->
      
      <nav class="mt-8 flex flex-col gap-1">
        @for (item of nav; track item.to) {
          <a 
            [routerLink]="item.to"
            routerLinkActive="bg-primary text-primary-foreground shadow-soft"
            [routerLinkActiveOptions]="{exact: item.to === '/'}"
            class="group flex items-center gap-3 rounded-xl px-3 py-2.5 text-sm font-medium transition-colors text-muted-foreground hover:bg-muted hover:text-foreground">
            <i [class]="item.icon"></i>
            {{ item.label }}
          </a>
        }
      </nav>

      <div class="mt-auto rounded-2xl p-4 gradient-warm text-[oklch(0.25_0.03_55)]">
        <i class="bi bi-activity"></i>
        <p class="mt-2 text-sm font-semibold">Dica Cyrrus</p>
        <p class="mt-1 text-xs leading-relaxed opacity-90">
          Configure lembretes inteligentes e receba alertas antes do vencimento.
        </p>
      </div>
    </aside>

  <div class="main-area">

    @if(!isLoginPage) {
      <header class="header d-flex align-items-center justify-content-between px-3 py-2 bg-white shadow-sm">
        <aside class="sticky top-0 z-20 mx-0 lg:rounded-2xl bg-background/85 backdrop-blur border-b lg:border border-border px-4 lg:px-6 py-3.5">
          <div class="grid grid-cols-[minmax(0,1fr)_auto] items-center gap-3 lg:gap-6">
            <div class="flex min-w-0 items-center gap-3">
              <div class="lg:hidden"><app-brand [compact]="true"></app-brand></div>
              
              <div class="hidden md:flex items-center gap-2 rounded-xl bg-muted px-3 py-2 w-full max-w-md">
                <i class="bi bi-search"></i>  
                <input 
                  type="text"
                  placeholder="Buscar crianças, vacinas, campanhas..."
                  class="border-0 bg-transparent p-0 h-auto shadow-none focus-visible:ring-0 placeholder:text-muted-foreground/70 flex-1">
              </div>
            </div>

            <div class="flex items-center gap-2 shrink-0">
              <button class="relative inline-flex h-9 w-9 items-center justify-center rounded-xl bg-muted hover:bg-muted/70 transition-colors">
                <i class="bi bi-bell"></i> 
                <span class="absolute top-2 right-2 h-2 w-2 rounded-full bg-accent"></span>
              </button>
              
              <div class="hidden sm:flex items-center gap-2.5 pl-2">
                <div class="text-right">
                  <p class="text-xs font-semibold leading-tight">Família Martins</p>
                  <p class="text-[10px] text-muted-foreground leading-tight">5 crianças</p>
                </div>
                <div class="h-9 w-9 rounded-xl gradient-primary grid place-items-center text-xs font-bold text-primary-foreground">
                  FM
                </div>
              </div>
            </div>
          </div>
        </aside>
      </header>
    }

    
    <main class="content-area">
      <router-outlet></router-outlet>
    </main>
  </div>
  
  @if(sidebarOpen && isMobile) {
    <div class="sidebar-backdrop" (click)="sidebarOpen = false"></div>
  }

     

</div>
