<div class="layout-root bg-slate-600">
  <aside class="sidebar hidden lg:flex w-64 shrink-0 flex-col text-white sticky top-0 h-screen">
    <a routerLink="/dashboard">
      <div class="cursor-pointer items-center gap-x-3 mb-8 px-2 hidden lg:flex">
        <div class="w-11 h-11 shrink-0 rounded-full bg-linear-to-r from-(--primary) to-(--secondary) flex items-center justify-center shadow-lg shadow-black/20">
          <i class="bi bi-calendar-heart text-2xl text-(--dark)"></i>
        </div>
  
        <div class="flex flex-col gap-1">
          <span class="font-bold text-[1.75rem] leading-none text-white tracking-tight">Cyrrus</span>
          <span class="text-[10px] font-semibold uppercase tracking-[0.125em] text-(--secondary) mt-0.5">Vacinação Infantil</span>
        </div>
      </div>

    </a>

    <nav class="flex flex-col gap-1 mt-4">
      @for (item of nav; track item.to) {
        <a 
          [routerLink]="item.to"
          routerLinkActive="bg-(--accent) text-white shadow-md"
          [routerLinkActiveOptions]="{exact: item.to === '/'}"
          class="group flex items-center gap-3 rounded-xl px-4 py-3 text-sm font-medium transition-all hover:bg-(--primary)">
          <i [class]="item.icon" class="text-xl"></i>
          {{ item.label }}
        </a>
      }
    </nav>

    <div class="mt-auto rounded-2xl p-4 bg-linear-to-br from-orange-500 to-amber-500 text-white text-sm">
      <i class="bi bi-lightbulb"></i>
      <p class="mt-2 font-semibold">Dica Cyrrus</p>
      <p class="text-xs opacity-90 mt-1">
        Configure lembretes e receba alertas antes do vencimento.
      </p>
    </div>
  </aside>

  <!-- MAIN AREA -->
  <div class="main-area flex-1 flex flex-col min-h-screen">

    <header class="bg-(--primary) top-0 z-50 sticky mx-0 bg-background/85 backdrop-blur px-4 lg:px-6 py-1.5">
      <div class="lg:px-6 py-4 flex items-center justify-between">
        <a routerLink="/dashboard">
          <div class="flex items-center gap-x-3 lg:hidden">
            <div class="w-9 h-9 shrink-0 rounded-full bg-linear-to-r from-(--primary) to-(--secondary) flex items-center justify-center shadow-lg shadow-black/20">
              <i class="bi bi-calendar-heart text-xl text-(--dark)"></i>
            </div>
  
            <div class="flex flex-col gap-1">
              <span class="font-bold text-[1.65rem] leading-none text-(--dark) tracking-tight">Cyrrus</span>
              <span class="text-[9px] font-semibold uppercase tracking-[0.125em] text-white">Vacinação Infantil</span>
            </div>
          </div>
        </a>

        <div class="flex-1 flex items-center justify-center md:justify-start">
          <div class="hidden md:flex w-full max-w-md">
            <div class="relative flex-1 group">
              <div class="flex items-center gap-3 bg-[#F8F5EF] hover:bg-[#F4EFE6] focus-within:bg-white 
                          border border-gray-100 focus-within:border-(--accent) 
                          rounded-full px-5 py-3 transition-all duration-200 shadow-sm focus-within:shadow-md">
                
                <i class="bi bi-search text-gray-400 group-focus-within:text-(--accent) text-lg transition-colors"></i>
                
                <input 
                  type="text" 
                  placeholder="Buscar crianças, vacinas, campanhas..."
                  class="bg-transparent border-0 focus:outline-none flex-1 text-sm text-(--dark) placeholder:text-gray-400">
              </div>
            </div>
          </div>
        </div>

        <div class="flex items-center gap-3">
          <button class="relative w-9 h-9 flex items-center justify-center rounded-xl hover:bg-muted">
            <i class="bi bi-bell text-xl"></i>
            <span class="absolute top-1 right-1 h-3 w-3 bg-red-500 rounded-full"></span>
          </button>

          <div class="hidden sm:flex items-center gap-3">
            <div class="text-right">
              <p class="font-semibold text-sm">Família Martins</p>
              <p class="text-xs text-muted-foreground">5 crianças</p>
            </div>
            <div class="w-9 h-9 bg-linear-to-br from-orange-400 to-amber-500 rounded-2xl flex items-center justify-center text-white font-bold">
              FM
            </div>
          </div>
        </div>
      </div>
    </header>

    <!-- CONTEÚDO -->
    <main class="flex-1 overflow-auto p-4 lg:p-6 pb-20 lg:pb-6">
      <router-outlet></router-outlet>
    </main>

    <nav class="bottom-nav lg:hidden fixed bottom-0 left-0 right-0 bg-[#1A2035] text-white border-t border-orange-500/20 shadow-2xl z-50">
      <div class="flex items-center justify-around py-3 px-2 max-w-lg mx-auto">
        @for (item of nav; track item.to) {
          <a 
            [routerLink]="item.to"
            routerLinkActive="active"
            class="flex flex-col items-center justify-center gap-1 py-2 px-4 rounded-2xl transition-all duration-200 flex-1">
            <i [class]="item.icon + ' text-2xl'"></i>
            <span class="text-xs font-medium mt-1">{{ item.label }}</span>
          </a>
        }
      </div>
    </nav>
  </div>
</div>
