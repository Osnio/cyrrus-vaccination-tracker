<div class="filter-toolbar bg-white rounded-3xl shadow-sm border border-gray-100 p-5">

  <div class="flex flex-col lg:flex-row gap-4 items-stretch">

    <!-- Search -->
    <div class="flex-1 relative">
      <div class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400">
        <i class="bi bi-search"></i>
      </div>
      <input 
        type="text"
        [ngModel]="searchTerm"
        (ngModelChange)="onSearchChange($event)"
        placeholder="Buscar por nome..."
        class="w-full bg-[#f8f4ed] border border-transparent focus:border-(--accent) pl-11 py-3.5 rounded-2xl text-sm focus:outline-none">
    </div>

    <!-- Status -->
    <div *ngIf="showStatusFilter" class="lg:w-52">
      <app-custom-select
        [options]="statusOptions"
        [selectedValue]="activeFilter"
        (valueChange)="onFilterChange($event)"
        placeholder="Status">
      </app-custom-select>
    </div>

    <!-- Ordenação -->
    <div *ngIf="showSortFilter" class="lg:w-52">
      <app-custom-select
        [options]="sortOptions"
        [selectedValue]="sortBy"
        (valueChange)="onSortChange($event)"
        placeholder="Ordenar por">
      </app-custom-select>
    </div>

    <!-- Data De - Até -->
    <div *ngIf="showDateFilter" class="flex gap-3 items-end">
      <div class="flex flex-col">
        <span class="text-xs text-gray-500 mb-1">De</span>
        <input type="date" 
               [ngModel]="startDate" 
               (ngModelChange)="onStartDateChange($event)"
               class="bg-[#f8f4ed] border border-transparent focus:border-(--accent) px-4 py-3.5 rounded-2xl text-sm">
      </div>
      <div class="flex flex-col">
        <span class="text-xs text-gray-500 mb-1">Até</span>
        <input type="date" 
               [ngModel]="endDate" 
               (ngModelChange)="onEndDateChange($event)"
               class="bg-[#f8f4ed] border border-transparent focus:border-(--accent) px-4 py-3.5 rounded-2xl text-sm">
      </div>
    </div>

    <!-- Limpar -->
    <div *ngIf="showClearButton" class="flex flex-col">
      <span class="text-xs text-gray-500 mb-1">Limpar</span>
      <button (click)="clearFilters()"
              class="px-6 py-3 text-red-600 hover:text-red-700 font-medium transition-colors flex items-center gap-2 whitespace-nowrap">
        <i class="bi bi-x-circle"></i>
        Limpar
      </button>
    </div>

  </div>
</div>
