<div class="child-card">
  <div class="w-16 avatar h-16 rounded-2xl overflow-hidden border-2 border-white shadow-sm shrink-0">
    <img *ngIf="child.photoUrl" 
         [src]="child.photoUrl" 
         alt="{{ child.nome || child.crianca || child.name || 'Criança' }}"
         class="w-full h-full object-cover">

    <div *ngIf="!child.photoUrl" 
         class="w-full h-full bg-(--secondary) text-(--dark) flex items-center justify-center font-bold text-xl">
      {{ getInitials(child.nome || child.crianca || child.name || '') }}
    </div>
  </div>

  <h4 class="name">{{ child.nome || child.crianca || child.name || 'Criança sem nome' }}</h4>
  <p class="age">{{ child.idade || child.age || 'Idade não informada' }}</p>

  <div class="progress-container">
    <svg class="progress-ring" viewBox="0 0 42 42">
      <circle cx="21" cy="21" r="15" fill="none" stroke="#e5e7eb" stroke-width="5"/>
      <circle cx="21" cy="21" r="15" fill="none" 
              [attr.stroke]="child.porcentagem === 100 ? 'var(--primary)' : 'var(--accent)'"
              stroke-width="5"
              [attr.stroke-dasharray]="child.porcentagem + ', 100'"
              stroke-linecap="round"/>
    </svg>
    <div class="progress-text">
      <span>{{ child.porcentagem }}%</span>
    </div>
  </div>

  <div class="status-badge" 
       [ngClass]="{
         'em-dia': child.status === 'Em',
         'proxima': child.status === 'Próxima',
         'atraso': child.status === 'Vacina'
       }">
    {{ child.status }}
  </div>

  <p class="detalhe">{{ child.detalhe }}</p>
</div>
