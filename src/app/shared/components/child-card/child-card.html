<a [routerLink]="['/children', child.id]" class="block hover:scale-[1.02] transition-transform duration-200">
  <main class="card">
    <aside class="header">
      <section class="profile">
        <div class="avatar">

          <img *ngIf="child.photoUrl" 
              [src]="child.photoUrl" 
              alt="Foto de {{ child.name }}"
              class="w-full h-full object-cover">

          <span *ngIf="!child.photoUrl">{{ getInitials() }}</span>

        </div>
        <span *ngIf="isNew()" 
        class="absolute -top-2 -right-2 bg-emerald-500 text-white text-[10px] font-bold px-3 py-1 rounded-full shadow-md flex items-center gap-1 z-10">
    <span class="w-2 h-2 bg-white rounded-full animate-pulse"></span>
    NOVO
  </span>

        <div class="info">
          <h3>{{ child.name }}</h3>
          <p>{{ child.age }}</p>
          <span  class="text-xs text-gray-400 font-normal">
              {{ formatCreatedDate(child.createdAt) }}
            </span>
        </div>
      </section>

      <span class="chevron"><i class="bi bi-arrow-right-short"></i></span>
    </aside>

    <div class="status" [ngClass]="getStatusClass()">
      {{ child.status }}
    </div>

    <div class="progress-header">
      <span>Calendário vacinal</span>
      <strong>{{ child.progress }}%</strong>
    </div>

    <div class="progress-bar">
      <div 
        class="fill" 
        [ngClass]="getProgressBarClass()"
        [style.width]="child.progress + '%'">
      </div>
    </div>

    <div class="stats">
      <div>
        <strong>{{ child.applied }}</strong>
        <span>APLICADAS</span>
      </div>
      <div>
        <strong>{{ child.pending }}</strong>
        <span>PENDENTES</span>
      </div>
      <div>
        <strong>{{ child.overdue }}</strong>
        <span>ATRASADAS</span>
      </div>
    </div>
  </main>
</a>
