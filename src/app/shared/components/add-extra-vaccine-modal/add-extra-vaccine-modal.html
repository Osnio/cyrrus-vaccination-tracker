<div class="fixed inset-0 bg-black/60 flex items-center justify-center z-50 p-4" (click)="close()">
  <div class="bg-white rounded-3xl shadow-2xl max-w-lg w-full" (click)="$event.stopPropagation()">
    <div class="px-8 pt-8 pb-6">
      <h2 class="text-2xl font-bold text-(--dark)">Adicionar Vacina Extra</h2>
      <p class="text-gray-500 mt-1">Adicione uma vacina personalizada ao calendário</p>
    </div>

    <form (ngSubmit)="onSubmit()" class="px-8 pb-8 space-y-5">
      <div>
        <label class="block text-sm font-medium text-(--dark) mb-2">Nome da Vacina</label>
        <input [(ngModel)]="formData.nome" name="nome" required
               class="w-full px-5 py-4 border border-gray-200 rounded-3xl focus:outline-none focus:border-(--primary)">
      </div>

      <div>
        <label class="block text-sm font-medium text-(--dark) mb-2">Dose</label>
        <input [(ngModel)]="formData.dose" name="dose" required placeholder="Ex: Dose 2/2"
               class="w-full px-5 py-4 border border-gray-200 rounded-3xl focus:outline-none focus:border-(--primary)">
      </div>

      <div>
        <label class="block text-sm font-medium text-(--dark) mb-2">Descrição</label>
        <textarea [(ngModel)]="formData.desc" name="desc" rows="3"
                  class="w-full px-5 py-4 border border-gray-200 rounded-3xl focus:outline-none focus:border-(--primary)"></textarea>
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-(--dark) mb-2">Data Sugerida</label>
          <input type="date" [(ngModel)]="formData.data" name="data" required
                 class="w-full px-5 py-4 border border-gray-200 rounded-3xl focus:outline-none focus:border-(--primary)">
        </div>
        <div>
          <label class="block text-sm font-medium text-(--dark) mb-2">Recomendado</label>
          <input [(ngModel)]="formData.recom" name="recom" placeholder="Ex: 12 meses"
                 class="w-full px-5 py-4 border border-gray-200 rounded-3xl focus:outline-none focus:border-(--primary)">
        </div>
      </div>

      <div class="flex gap-4 pt-6">
        <button type="button" (click)="close()"
                class="flex-1 py-4 border border-gray-300 rounded-3xl font-medium">
          Cancelar
        </button>
        <button type="submit"
                class="flex-1 py-4 bg-(--primary) text-white rounded-3xl font-semibold">
          Adicionar Vacina
        </button>
      </div>
    </form>
  </div>
</div>
