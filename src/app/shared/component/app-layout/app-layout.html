      <!-- Page header -->
      <div class="px-4 lg:px-6 pt-6 lg:pt-8">
        <div class="grid grid-cols-[minmax(0,1fr)_auto] items-end gap-4 flex-wrap">
          <div class="min-w-0">
            <p class="text-xs font-medium uppercase tracking-[0.18em] text-primary">Cyrrus Health</p>
            <h1 class="mt-1.5 text-2xl sm:text-3xl font-extrabold text-balance">{{ title }}</h1>
            @if (subtitle) {
              <p class="mt-1.5 text-sm text-muted-foreground max-w-2xl">{{ subtitle }}</p>
            }
          </div>
          @if (actions) {
            <div class="shrink-0 flex gap-2">{{ actions }}</div>
          }
        </div>
      </div>

      <!-- Page Content -->
      <div class="px-4 lg:px-6 py-6 lg:py-8">
        <ng-content></ng-content>
      </div>

      <!-- Mobile bottom nav -->
      <nav class="lg:hidden fixed bottom-3 left-3 right-3 z-30 surface-card flex justify-around py-1.5 px-2">
        @for (item of nav; track item.to) {
          <a 
            [routerLink]="item.to"
            routerLinkActive="text-primary"
            class="flex flex-col items-center gap-0.5 px-3 py-1.5 rounded-lg text-[10px] font-semibold text-muted-foreground">
            <i [class]="item.icon"></i>
            {{ item.label }}
          </a>
        }
      </nav>
      <div class="lg:hidden h-20"></div>
    </main>
  </div>
