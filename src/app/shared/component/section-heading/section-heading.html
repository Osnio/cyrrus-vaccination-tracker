<div [class]="className || ''" class="flex items-end justify-between gap-4 mb-4 flex-wrap">
  <div class="min-w-0">
    <h2 class="text-lg font-bold text-(--color-dark)">{{ title }}</h2>
    @if (description) {
      <p class="text-sm text-muted-foreground mt-0.5">{{ description }}</p>
    }
  </div>
  @if (action) {
    <ng-container>{{ action }}</ng-container>
  }
</div>
