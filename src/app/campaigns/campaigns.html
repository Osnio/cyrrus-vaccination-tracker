<main class="max-w-7xl mx-auto">
  <app-page-header 
    title="Campanhas de Vacinação" 
    subtitle="Acompanhe as oportunidades de imunização disponíveis para sua família."
  />

  <!-- Banner de Destaque -->
  <div class="highlight-banner mb-12">
    <div class="highlight-tag"><i class="bi bi-megaphone text-(--accent)"></i> EM DESTAQUE</div>
    <h2 class="highlight-title">Campanha Nacional de Vacinação contra a Gripe 2026</h2>
    <p class="highlight-desc">Imunização gratuita contra os subtipos circulantes do vírus Influenza, com foco em crianças de 6 meses a 6 anos.</p>
    
    <div class="highlight-meta">
      <div class="meta-item">
        <i class="bi bi-people"></i>
        <span>Crianças de 6 meses a 6 anos</span>
      </div>
      <div class="meta-item">
        <i class="bi bi-calendar3"></i>
        <span>10 jun → 09 ago</span>
      </div>
    </div>
  </div>

  <div class="mb-8">
    <app-filter-toolbar
      [searchTerm]="searchTerm"
      [activeFilter]="activeFilter"
      [filters]="filters"
      (searchChange)="onSearchChange($event)"
      (filterChange)="setFilter($event)">
    </app-filter-toolbar>
  </div>


  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
    <app-campaigns-card 
      *ngFor="let campaign of pagedCampaigns" 
      [campaign]="campaign">
    </app-campaigns-card>
  </div>

    <app-pagination
    [currentPage]="currentPage"
    [totalItems]="filteredCampaigns.length"
    [pageSize]="PAGE_SIZE"
    (pageChange)="currentPage = $event">
</app-pagination>
</main>
